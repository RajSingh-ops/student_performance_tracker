services:
  - type: web
    name: performance-tracker
    env: docker
    branch: main
    plan: free
    region: oregon
    dockerfilePath: Dockerfile
    startCommand: gunicorn yearscore.wsgi:application --bind 0.0.0.0:$PORT

databases:
  - name: perfdb
    engine: postgres
    version: "15"
    plan: free
    region: oregon

# Note: For secrets (SECRET_KEY, DATABASE_URL, EMAIL_* etc.) set them in the Render dashboard or
# via the Render CLI after creation. Do NOT commit secrets into the repo.
