version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=perfdb
      - POSTGRES_USER=perfuser
      - POSTGRES_PASSWORD=perfpass
    volumes:
      - postgres_data:/var/lib/postgresql/data/
  web:
    build: .
    command: gunicorn yearscore.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=0
      - DATABASE_URL=postgres://perfuser:perfpass@db:5432/perfdb
    depends_on:
      - db

volumes:
  postgres_data:
