{% extends "base.html" %}
{% block title %}Dashboard 2026{% endblock %}

{% block content %}

<h2 class="mb-4 text-center">Your 2026 Performance Calendar</h2>

<div class="heatmap-wrapper shadow-sm p-4 bg-white rounded">
    <div id="heatmap" class="heatmap-grid"></div>
    <div id="month-labels" class="month-labels-row"></div>
</div>

<hr class="my-5">

<h3>Daily Performance Trend</h3>
<canvas id="lineChart" height="90"></canvas>

<style>
/* ---------- HEATMAP LAYOUT ---------- */
.heatmap-wrapper {
    overflow-x: auto;
    background: #fff;
    border: 1px solid #e1e4e8;
}

.heatmap-grid {
    display: grid;
    /* 53 weeks across, 7 days down */
    grid-template-columns: repeat(53, 14px);
    grid-template-rows: repeat(7, 14px);
    grid-auto-flow: column;
    gap: 3px;
    margin-bottom: 8px;
}

.month-labels-row {
    display: grid;
    grid-template-columns: repeat(53, 14px);
    gap: 3px;
    font-size: 11px;
    color: #586069;
}

.day-box {
    width: 14px;
    height: 14px;
    border-radius: 2px;
    background-color: #ebedf0; /* Default empty state */
}

/* Tooltip style */
.day-box:hover {
    outline: 1px solid #111;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// ===============================
// READ DJANGO DATA
// ===============================
const scoreData = JSON.parse('{{ score_data|safe|escapejs }}');
const joinDate = "{{ join_date }}";
const today = "{{ today }}";

// ===============================
// 2026 DATE GENERATION
// ===============================
function get2026Dates() {
    let arr = [];
    const year = 2026; // Forced to 2026
    let d = new Date(year, 0, 1);
    
    // In 2026, Jan 1st is a Thursday. 
    // We want the grid to always start on a Sunday to keep rows consistent.
    // Shift back to the preceding Sunday.
    const startOffset = d.getDay(); 
    d.setDate(d.getDate() - startOffset);

    // Fill exactly 53 weeks (371 days) to keep the grid perfectly rectangular
    for (let i = 0; i < 53 * 7; i++) {
        arr.push(new Date(d));
        d.setDate(d.getDate() + 1);
    }
    return arr;
}

const days = get2026Dates();

// ===============================
// RENDER HEATMAP & DYNAMIC LABELS
// ===============================
let heatHTML = "";
let monthLabelsArr = new Array(53).fill("");
let currentMonth = -1;

days.forEach((day, index) => {
    const dateStr = day.toISOString().split("T")[0];
    const col = Math.floor(index / 7);
    const row = (index % 7) + 1;
    const isActually2026 = day.getFullYear() === 2026;

    // Handle Month Labels (Placed at the start of each month)
    if (isActually2026 && day.getMonth() !== currentMonth) {
        currentMonth = day.getMonth();
        monthLabelsArr[col] = day.toLocaleString("default", { month: "short" });
    }

    // Determine Color
    let color = "#ebedf0"; // Default (Empty)
    if (!isActually2026) {
        color = "transparent"; // Padding days outside 2026
    } else if (typeof scoreData[dateStr] !== 'undefined') {
        let score = Number(scoreData[dateStr]);
        if (score >= 4.5) color = "#216e39";      // Level 4
        else if (score >= 3.5) color = "#30a14e"; // Level 3
        else if (score >= 2.5) color = "#40c463"; // Level 2
        else if (score >= 1.5) color = "#9be9a8"; // Level 1
        else color = "#ebedf0";                   // Level 0
    } else if (dateStr < joinDate) {
        color = "#f6f8fa"; // Before user joined
    }

    heatHTML += `
        <div class="day-box" 
             title="${isActually2026 ? dateStr : ''}"
             style="grid-column: ${col + 1}; grid-row: ${row}; background: ${color}; 
                    border: ${color === '#ebedf0' ? '1px solid #e1e4e8' : 'none'}">
        </div>
    `;
});

// Render Month Labels
let monthHTML = "";
monthLabelsArr.forEach(label => {
    monthHTML += `<div style="grid-column: span 1;">${label}</div>`;
});

document.getElementById("heatmap").innerHTML = heatHTML;
document.getElementById("month-labels").innerHTML = monthHTML;

// ===============================
// (KEEP YOUR EXISTING CHART.JS LOGIC BELOW)
// ===============================
// ... lineChart, barChart, and pieChart code from your original snippet ...
</script>
{% endblock %}
