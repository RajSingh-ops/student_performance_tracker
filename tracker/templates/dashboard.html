{% extends "base.html" %}
{% block title %}Dashboard 2026{% endblock %}

{% block content %}

<h2 class="mb-4 text-center">Your 2026 Performance Calendar</h2>

<div class="d-flex justify-content-between align-items-end mb-2 px-1" style="max-width: 950px; margin: 0 auto; font-family: sans-serif;">
    <div style="font-size: 18px; color: #333;">
        <strong id="total-submissions">0</strong> submissions in 2026
    </div>
    <div style="font-size: 14px; color: #8c8c8c;">
        Total active days: <span style="color: #333;" id="active-days">0</span> 
        &nbsp;&nbsp; Max streak: <span style="color: #333;" id="max-streak">0</span>
    </div>
</div>

<div class="heatmap-container shadow-sm p-4 bg-white rounded mb-5">
    <div id="heatmap-flex" class="heatmap-flex">
        </div>
</div>

<div class="row">
    <div class="col-md-8">
        <h3>Daily Performance Trend</h3>
        <canvas id="lineChart" height="120"></canvas>
    </div>
    <div class="col-md-4">
        <h3>Score Distribution</h3>
        <canvas id="pieChart" height="120"></canvas>
    </div>
</div>

<style>
/* ---------- DESIGN STYLES ---------- */
.heatmap-container { overflow-x: auto; background: #fff; border: 1px solid #e1e4e8; }
.heatmap-flex { display: flex; gap: 12px; justify-content: center; align-items: flex-start; }
.month-block { display: flex; flex-direction: column; align-items: center; }
.month-label { font-size: 11px; color: #8c8c8c; margin-top: 8px; }
.month-grid { 
    display: grid; 
    grid-template-rows: repeat(7, 12px); /* 7 days down */
    grid-auto-columns: 12px;           /* weeks across */
    grid-auto-flow: column; 
    gap: 3px; 
}
.day-box { width: 12px; height: 12px; border-radius: 2px; background-color: #ebedf0; transition: transform 0.1s; }
.day-box:hover { transform: scale(1.3); z-index: 10; outline: 1px solid #333; }

/* Levels */
.lvl-0 { background-color: #ebedf0; border: 1px solid #e1e4e8; }
.lvl-1 { background-color: #9be9a8; }
.lvl-2 { background-color: #40c463; }
.lvl-3 { background-color: #30a14e; }
.lvl-4 { background-color: #216e39; }
.not-2026 { background-color: transparent !important; border: none !important; }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// ===============================
// DATA & UTILS
// ===============================
const scoreData = JSON.parse('{{ score_data|safe|escapejs }}');
const joinDate = "{{ join_date }}";
const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

// Helper to match your scoreData keys (YYYY-MM-DD) without timezone shifts
const formatDate = (d) => {
    let month = '' + (d.getMonth() + 1);
    let day = '' + d.getDate();
    if (month.length < 2) month = '0' + month;
    if (day.length < 2) day = '0' + day;
    return [d.getFullYear(), month, day].join('-');
};

// ===============================
// CORE LOGIC
// ===============================
function initDashboard() {
    const flexContainer = document.getElementById("heatmap-flex");
    let totalScore = 0;
    let activeDays = 0;
    let currentStreak = 0;
    let maxStreak = 0;

    const chartLabels = [];
    const chartValues = [];

    // Loop through each month to build the design blocks
    for (let m = 0; m < 12; m++) {
        let monthHTML = `<div class="month-block"><div class="month-grid">`;
        
        // Month boundaries
        let firstDayOfMonth = new Date(2026, m, 1);
        let lastDayOfMonth = new Date(2026, m + 1, 0);

        // Your Logic: Calculate the preceding Sunday to keep rows consistent
        let startDate = new Date(firstDayOfMonth);
        startDate.setDate(startDate.getDate() - startDate.getDay());

        // Fill grid from that Sunday until the end of the month's last week
        let curr = new Date(startDate);
        while (curr <= lastDayOfMonth || curr.getDay() !== 0) {
            const dateStr = formatDate(curr);
            const isActualMonth = curr.getMonth() === m && curr.getFullYear() === 2026;
            
            let colorClass = "lvl-0";
            let score = scoreData[dateStr] || 0;

            if (!isActualMonth) {
                colorClass = "not-2026";
            } else {
                // Statistics Tracking (Only for actual 2026 days)
                if (score > 0) {
                    activeDays++;
                    totalScore += score;
                    currentStreak++;
                    if (currentStreak > maxStreak) maxStreak = currentStreak;
                } else {
                    currentStreak = 0;
                }

                // Color Mapping
                if (score >= 4.5) colorClass = "lvl-4";
                else if (score >= 3.5) colorClass = "lvl-3";
                else if (score >= 2.5) colorClass = "lvl-2";
                else if (score >= 1.5) colorClass = "lvl-1";
                
                chartLabels.push(dateStr);
                chartValues.push(score);
            }

            monthHTML += `<div class="day-box ${colorClass}" title="${isActualMonth ? dateStr + ': ' + score : ''}"></div>`;
            
            curr.setDate(curr.getDate() + 1);
            if (curr.getDay() === 0 && curr > lastDayOfMonth) break; 
        }

        monthHTML += `</div><div class="month-label">${monthNames[m]}</div></div>`;
        flexContainer.innerHTML += monthHTML;
    }

    // Update Header UI
    document.getElementById('active-days').innerText = activeDays;
    document.getElementById('total-submissions').innerText = Math.round(totalScore);
    document.getElementById('max-streak').innerText = maxStreak;

    renderLineChart(chartLabels, chartValues);
    renderPieChart(chartValues);
}

// ===============================
// CHARTS
// ===============================
function renderLineChart(labels, data) {
    new Chart(document.getElementById('lineChart').getContext('2d'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                data: data,
                borderColor: '#216e39',
                backgroundColor: 'rgba(48, 161, 78, 0.1)',
                borderWidth: 2,
                pointRadius: 0,
                pointHoverRadius: 5,
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                y: { min: 0, max: 5, ticks: { stepSize: 1 } },
                x: { display: false }
            }
        }
    });
}

function renderPieChart(values) {
    const counts = [0, 0, 0, 0, 0];
    values.forEach(v => {
        if (v >= 4.5) counts[4]++;
        else if (v >= 3.5) counts[3]++;
        else if (v >= 2.5) counts[2]++;
        else if (v >= 1.5) counts[1]++;
        else if (v > 0) counts[0]++;
    });

    new Chart(document.getElementById('pieChart').getContext('2d'), {
        type: 'doughnut',
        data: {
            labels: ['Lvl 0', 'Lvl 1', 'Lvl 2', 'Lvl 3', 'Lvl 4'],
            datasets: [{
                data: counts,
                backgroundColor: ['#ebedf0', '#9be9a8', '#40c463', '#30a14e', '#216e39']
            }]
        },
        options: { plugins: { legend: { position: 'bottom' } } }
    });
}

initDashboard();
</script>
{% endblock %}
