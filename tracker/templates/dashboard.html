{% extends "base.html" %}
{% block title %}Dashboard 2026{% endblock %}

{% block content %}

<h2 class="mb-4 text-center">Your 2026 Performance Calendar</h2>

<div class="heatmap-container shadow-sm p-4 bg-white rounded">
    <div id="heatmap-flex" class="heatmap-flex">
        </div>
</div>

<hr class="my-5">

<h3>Daily Performance Trend</h3>
<canvas id="lineChart" height="90"></canvas>

<style>
/* ---------- LEETCODE STYLE HEATMAP ---------- */
.heatmap-container {
    overflow-x: auto;
    background: #fff;
    border: 1px solid #f0f0f0;
    padding-bottom: 20px;
}

.heatmap-flex {
    display: flex;
    gap: 12px; /* Gap between month blocks */
    justify-content: start;
    align-items: flex-start;
}

.month-block {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.month-label {
    font-size: 12px;
    color: #8c8c8c;
    margin-top: 8px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.month-grid {
    display: grid;
    /* Max 6 weeks in a month block, 7 days down */
    grid-template-rows: repeat(7, 10px);
    grid-auto-columns: 10px;
    grid-auto-flow: column;
    gap: 3px;
}

.day-box {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    background-color: #ebedf0; 
    transition: transform 0.1s;
}

.day-box:hover {
    transform: scale(1.2);
    z-index: 10;
    outline: 1px solid #333;
}

/* Color Scale - Matching the image's vibrant greens */
.lvl-0 { background-color: #ebedf0; }
.lvl-1 { background-color: #9be9a8; }
.lvl-2 { background-color: #40c463; }
.lvl-3 { background-color: #30a14e; }
.lvl-4 { background-color: #216e39; }
</style>

<script>
const scoreData = JSON.parse('{{ score_data|safe|escapejs }}');
const joinDate = "{{ join_date }}";

const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

function renderHeatmap() {
    const container = document.getElementById("heatmap-flex");
    let html = "";

    for (let m = 0; m < 12; m++) {
        let monthHTML = `<div class="month-block">`;
        monthHTML += `<div class="month-grid">`;

        // Get all days in this specific month for 2026
        let date = new Date(2026, m, 1);
        
        // To align the grid vertically by day of week (Sun-Sat)
        // We add empty/transparent placeholders for the first week
        let firstDayIndex = date.getDay(); // 0 (Sun) to 6 (Sat)
        for(let p = 0; p < firstDayIndex; p++) {
            monthHTML += `<div style="background:transparent; width:10px; height:10px;"></div>`;
        }

        while (date.getMonth() === m) {
            const dateStr = date.toISOString().split("T")[0];
            let colorClass = "lvl-0";

            if (scoreData[dateStr] !== undefined) {
                let score = Number(scoreData[dateStr]);
                if (score >= 4.5) colorClass = "lvl-4";
                else if (score >= 3.5) colorClass = "lvl-3";
                else if (score >= 2.5) colorClass = "lvl-2";
                else if (score >= 1.5) colorClass = "lvl-1";
            } else if (dateStr < joinDate) {
                colorClass = "lvl-0"; // or a custom "not joined" color
            }

            monthHTML += `<div class="day-box ${colorClass}" title="${dateStr}"></div>`;
            date.setDate(date.getDate() + 1);
        }

        monthHTML += `</div>`; // Close grid
        monthHTML += `<div class="month-label">${monthNames[m]}</div>`;
        monthHTML += `</div>`; // Close block
        html += monthHTML;
    }

    container.innerHTML = html;
}

renderHeatmap();
</script>
{% endblock %}
