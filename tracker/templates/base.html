<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Performance Tracker{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4 py-2">
    <a class="navbar-brand" href="/">Performance Tracker</a>

    <div class="d-flex align-items-center gap-3">

        <!-- Profile Icon with Dropdown -->
        <div class="dropdown">
            <a
                class="d-flex align-items-center justify-content-center rounded-circle bg-secondary text-white"
                href="#"
                role="button"
                id="profileDropdown"
                data-bs-toggle="dropdown"
                aria-expanded="false"
                style="width: 40px; height: 40px; font-size: 18px; text-decoration:none;"
            >
                {{ request.user.username|first|upper }}
            </a>

            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
                <li><a class="dropdown-item" href="{% url 'profile' %}">View Profile</a></li>
<li><a class="dropdown-item" href="{% url 'edit-profile' %}">Edit Profile</a></li>
                <li><a class="dropdown-item" href="/criteria/">Edit Goals</a></li>
                <li><a class="dropdown-item" href="/review/">Add Review</a></li>
                <li><a class="dropdown-item" href="{% url 'password_change' %}">Change Password</a></li>

                <li><hr class="dropdown-divider"></li>

                <li><a class="dropdown-item" href="#">About Website</a></li>
                <li><a class="dropdown-item" href="{% url 'about-me' %}">About Me</a></li>
            </ul>
        </div>

        <a href="/accounts/logout/" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>


<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.querySelectorAll('.dropdown').forEach(function (dd) {
    dd.addEventListener('mouseover', function () {
        let dropdown = bootstrap.Dropdown.getOrCreateInstance(dd.querySelector('[data-bs-toggle="dropdown"]'));
        dropdown.show();
    });
    dd.addEventListener('mouseleave', function () {
        let dropdown = bootstrap.Dropdown.getOrCreateInstance(dd.querySelector('[data-bs-toggle="dropdown"]'));
        dropdown.hide();
    });
});
</script>


</body>
</html>
