<!DOCTYPE html>
<html>
<head>
    <title>Login – YearScore</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Background Video -->
<div class="video-container">
    <video autoplay muted loop playsinline class="bg-video">
        <source src="{% static 'videos/Office_Man_Climbs_Red_Stairs.mp4' %}" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
</div>

<div class="container-fluid vh-100 d-flex align-items-center justify-content-end">
    <div class="col-md-4 col-lg-3 me-5">
        <div class="card login-card shadow-lg">
            <div class="card-body">
                <h3 class="text-center mb-4">Login</h3>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100">Login</button>
                </form>

                <div class="text-center mt-3 small">
                    <a href="{% url 'password-reset' %}">Forgot Password?</a><br>
                    <a href="{% url 'register' %}">Create an account</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
