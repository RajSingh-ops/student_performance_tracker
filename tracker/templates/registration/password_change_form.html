{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 500px;">
    <h3 class="mb-3">Change Password</h3>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary w-100 mt-3" type="submit">Update Password</button>
    </form>
</div>
{% endblock %}
