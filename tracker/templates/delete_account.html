{% extends "base.html" %}

{% block content %}
<div class="container mt-5 text-center">
    <h2 class="text-danger">Delete Account</h2>

    <p class="mt-3">
        This action is <strong>permanent</strong>.
        All your data will be deleted.
    </p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger mt-3">
            Yes, delete my account
        </button>
        <a href="{% url 'profile' %}" class="btn btn-secondary mt-3 ms-2">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
