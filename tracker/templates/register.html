<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register – YearScore</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png"
          href="https://res.cloudinary.com/doobd64zf/image/upload/v1766846132/Screenshot_2025-12-27_193930_gqn96z.png">

    <!-- Apple Touch Icon (kept as requested) -->
    <link rel="apple-touch-icon"
          href="https://res.cloudinary.com/doobd64zf/image/upload/v1766846132/Screenshot_2025-12-27_193930_gqn96z.png">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        .register-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            padding: 10px;
        }

        .register-card h3 {
            font-weight: 600;
            color: #203a43;
        }

        .register-card form p {
            margin-bottom: 1rem;
        }

        .register-card input {
            border-radius: 10px;
            padding: 10px;
        }

        .btn-primary {
            border-radius: 10px;
            font-weight: 500;
            padding: 10px;
        }

        .links a {
            text-decoration: none;
            color: #2c5364;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .brand {
            text-align: center;
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 1.2rem;
            color: #2c5364;
        }
    </style>
</head>

<body>

<div class="register-card">
    <div class="card-body">

        <div class="brand">YearScore</div>

        <h3 class="text-center mb-4">Create Account</h3>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 mt-2">
                Register
            </button>
        </form>

        <div class="text-center mt-3 small links">
            Already have an account?
            <a href="{% url 'login' %}">Login here</a>
        </div>

    </div>
</div>

</body>
</html>
