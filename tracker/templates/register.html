<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register – YearScore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/doobd64zf/image/upload/v1766846132/Screenshot_2025-12-27_193930_gqn96z.png">
    
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/doobd64zf/image/upload/v1766846132/Screenshot_2025-12-27_193930_gqn96z.png">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", system-ui, sans-serif;
        }
        .register-card {
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            padding: 2rem;
        }
        .brand {
            text-align: center;
            font-weight: 700;
            font-size: 1.5rem;
            color: #2c5364;
            margin-bottom: 0.5rem;
        }
        
        form p input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-top: 5px;
        }
        .btn-primary {
            border-radius: 10px;
            padding: 12px;
            background: #203a43;
            border: none;
        }
        .btn-primary:hover {
            background: #2c5364;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="brand">YearScore</div>
    <h3 class="text-center mb-4" style="color: #203a43;">Create Account</h3>

    <form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="show-password-check">
        <label class="form-check-label small text-muted" for="show-password-check" style="cursor: pointer;">
            Show Password
        </label>
    </div>

    <button type="submit" class="btn btn-primary w-100 mt-1">
        Register
    </button>
</form>

    <div class="text-center mt-3 small">
        Already have an account? 
        <a href="{% url 'login' %}" style="color: #2c5364; text-decoration: none; font-weight: 600;">Login here</a>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const showPasswordCheck = document.getElementById('show-password-check');
    
    // When the checkbox is clicked
    showPasswordCheck.addEventListener('change', function() {
        // Find all input fields with type "password"
        const passwordInputs = document.querySelectorAll('input[type="password"], input[data-password-field]');
        
        passwordInputs.forEach(input => {
            if (this.checked) {
                // If checked, show text
                input.type = 'text';
                // We add a data attribute to remember it was a password field
                input.setAttribute('data-password-field', 'true');
            } else {
                // If unchecked, hide text
                input.type = 'password';
            }
        });
    });
});
</script>
</body>
</html>
