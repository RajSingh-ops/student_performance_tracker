<!DOCTYPE html>
<html>
<head>
    <title>Register – YearScore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/doobd64zf/image/upload/v1766846132/Screenshot_2025-12-27_193930_gqn96z.png">
    
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/doobd64zf/image/upload/v1766846132/Screenshot_2025-12-27_193930_gqn96z.png">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card shadow-sm p-4" style="width:400px;">
        <h3 class="text-center mb-3">Create Account</h3>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>

        <p class="mt-3 text-center">
            Already have an account?
            <a href="{% url 'login' %}">Login here</a>
        </p>
    </div>
</div>

</body>
</html>
