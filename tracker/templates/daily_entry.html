{% extends "base.html" %}
{% load dict_filters %}
{% block title %}Daily Entry{% endblock %}

{% block content %}
<h2 class="mb-3">Daily Entry – {{ today }}</h2>

<form method="post" class="card p-4 shadow-sm">
    {% csrf_token %}

    {% for c in criteria %}
        <div class="mb-4">
            <label class="form-label"><strong>{{ c.name }}</strong></label>

            <select name="rating_{{ c.id }}" class="form-select">
                {% with selected=existing_ratings|get_item:c.name %}
                <option value="1" {% if selected == 1 %}selected{% endif %}>1 - Poor</option>
                <option value="2" {% if selected == 2 %}selected{% endif %}>2 - Below Average</option>
                <option value="3" {% if selected == 3 %}selected{% endif %}>3 - OK</option>
                <option value="4" {% if selected == 4 %}selected{% endif %}>4 - Good</option>
                <option value="5" {% if selected == 5 %}selected{% endif %}>5 - Excellent</option>
                {% endwith %}
            </select>
        </div>
    {% endfor %}

    <!-- Overall Reflection -->
    <div class="mb-4">
        <label class="form-label fw-semibold">Overall reflection (optional)</label>
        <textarea
            name="reflection"
            class="form-control"
            rows="4"
            placeholder="How was your day overall? Mood, focus, stress, wins, distractions…"
        >{{ entry.reflection|default_if_none:"" }}</textarea>
    </div>

    <button type="submit" class="btn btn-primary w-100">Save</button>
</form>
{% endblock %}
